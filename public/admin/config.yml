backend:
  name: proxy
  proxy_url: http://localhost:8081/api/v1
  branch: main

publish_mode: editorial_workflow

media_folder: "public/uploads"
public_folder: "/uploads"

site_url: https://naturalcurlyhair.co.uk

collections:
  # ── Articles ────────────────────────────────────────────────────────────────
  - name: articles
    label: Articles
    label_singular: Article
    folder: src/content/articles
    create: true
    extension: mdx
    format: frontmatter
    slug: "{{slug}}"
    preview_path: "/hair-care/{{slug}}/"
    fields:
      - label: Title
        name: title
        widget: string
        required: true

      - label: Hub
        name: hub
        widget: select
        required: true
        options:
          - { label: "Waves — 2a", value: "2a" }
          - { label: "Waves — 2b", value: "2b" }
          - { label: "Waves — 2c", value: "2c" }
          - { label: "Curls — 3a", value: "3a" }
          - { label: "Curls — 3b", value: "3b" }
          - { label: "Curls — 3c", value: "3c" }
          - { label: "Coils — 4a", value: "4a" }
          - { label: "Coils — 4b", value: "4b" }
          - { label: "Coils — 4c", value: "4c" }
          - { label: "Hair Care", value: "hair-care" }
          - { label: "Products", value: "products" }
          - { label: "Parents", value: "parents" }

      - label: Category
        name: category
        widget: string
        required: true
        hint: "e.g. Method, Diagnostic, Verdict, UK context"

      - label: Dek (article summary shown in lists)
        name: dek
        widget: string
        required: true
        hint: "One sentence. Appears under the title in article lists. Max ~160 characters."

      - label: Published date
        name: published
        widget: datetime
        required: true
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"
        default: ""

      - label: Updated date
        name: updated
        widget: datetime
        required: false
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"

      - label: Read time
        name: readTime
        widget: string
        required: false
        hint: "e.g. '7 min'. Leave blank otherwise."

      - label: Featured
        name: featured
        widget: boolean
        default: false
        required: false

      - label: Tested
        name: tested
        widget: boolean
        default: false
        required: false

      - label: Draft
        name: draft
        widget: boolean
        default: true
        hint: "Leave as true until the article is ready to publish."

      - label: Confidence grade
        name: confidence_grade
        widget: select
        required: false
        hint: "How strong is the evidence behind this piece?"
        options:
          - { label: "High — strong evidence base", value: "high" }
          - { label: "Medium — reasonable consensus", value: "medium" }
          - { label: "Low — limited evidence, community observation", value: "low" }

      - label: Contributor
        name: contributor_id
        widget: select
        required: false
        hint: "Select the contributor who wrote or verified this article. Add new contributors to contributors.json first, then update this list."
        options:
          - { label: "Yemi Adeyinka", value: "contributor-1" }
          - { label: "Priya Okonkwo", value: "contributor-2" }
          - { label: "Sade Mensah", value: "contributor-3" }
          - { label: "Darren", value: "darren" }

      # ── Hero fields (optional) ──────────────────────────────────────────────
      - label: Hero image
        name: heroImage
        widget: image
        required: false
        hint: "Alt text is required when an image is set."

      - label: Hero image alt text
        name: heroImageAlt
        widget: string
        required: false
        hint: "Describe the image for screen readers."

      - label: Hero image credit
        name: heroImageCredit
        widget: string
        required: false
        hint: "Photographer or source credit shown beneath the image."

      - label: Standfirst
        name: standfirst
        widget: text
        required: false
        hint: "1–2 sentence intro shown beneath the article title."

      - label: Short answer
        name: shortAnswer
        widget: text
        required: false
        hint: "40–60 word direct answer shown in the highlighted box at the top of the article."

      # ── Body ───────────────────────────────────────────────────────────────
      - label: Body
        name: body
        widget: markdown
        required: true

      # ── Products (optional list) ────────────────────────────────────────────
      - label: Products
        name: products
        widget: list
        required: false
        collapsed: true
        summary: "{{fields.brand}} — {{fields.name}}"
        fields:
          - { label: Name, name: name, widget: string }
          - { label: Brand, name: brand, widget: string }
          - label: Verdict
            name: verdict
            widget: select
            options:
              - { label: "Buy", value: "buy" }
              - { label: "Skip", value: "skip" }
              - { label: "Not yet tested", value: "not-yet-tested" }
          - { label: Price, name: price, widget: string, required: false }
          - { label: Buy URL, name: buyUrl, widget: string, required: false, hint: "Full URL including https://" }
          - label: Claims (max 3)
            name: claims
            widget: list
            required: false
            field: { label: Claim, name: claim, widget: string }

  # ── Contributors ────────────────────────────────────────────────────────────
  # Writes to src/data/contributors.json as a files collection.
  #
  # Shape note: the existing contributors.json (committed in homepage v1) has
  # `initials` and `colour` fields that this spec does not list. Both are
  # included here as optional to match the committed shape. New fields from
  # this spec (bio, portrait, credentials, active) are additive.
  # Flagged to operator: existing placeholder entries lack bio/active.
  # ── Contributors ────────────────────────────────────────────────────────────
  # Phase 1 limitation: src/data/contributors.json is a bare JSON array.
  # Decap's files collection wraps list output in an object key, which would
  # break the homepage import (expects a bare array). This collection is
  # defined so the schema is locked and the UI is usable for reference, but
  # saving via Decap will write { "contributors_list": [...] } — not the
  # bare array the homepage expects.
  #
  # Phase 1 workaround: add contributors directly to src/data/contributors.json
  # by editing the file in an editor or via git. The Phase 2 handover doc
  # records this as a structural decision to resolve: either migrate the file
  # to { "contributors": [...] } and update the import, or use a folder
  # collection with a merge build step.
  - name: contributors_data
    label: Contributors
    files:
      - label: All contributors (read Phase 1 note above before saving)
        name: contributors
        file: src/data/contributors.json
        format: json
        fields:
          - label: Contributor list
            name: contributors_list
            widget: list
            summary: "{{fields.name}} — {{fields.role}}"
            fields:
              - label: ID
                name: id
                widget: string
                required: true
                hint: "Slug format, e.g. 'amara-osei'. Cannot be changed once articles reference it."

              - label: Name
                name: name
                widget: string
                required: true

              - label: Role
                name: role
                widget: string
                required: true
                hint: "e.g. 'Trichologist, Birmingham'"

              - label: Initials
                name: initials
                widget: string
                required: false
                hint: "Two letters for the avatar circle, e.g. 'YA'. Existing entries use this field."

              - label: Colour
                name: colour
                widget: string
                required: false
                hint: "Hex colour for the avatar circle, e.g. '#9C7494'. Existing entries use this field."

              - label: Bio
                name: bio
                widget: text
                required: false
                hint: "Max 300 characters. Plain text."

              - label: Portrait
                name: portrait
                widget: image
                required: false
                hint: "Square crop preferred. Used in article bylines."

              - label: Credentials
                name: credentials
                widget: list
                required: false
                hint: "e.g. 'FITric', 'IOT member'"
                field: { label: Credential, name: credential, widget: string }

              - label: Active
                name: active
                widget: boolean
                default: true
                hint: "Set to false to hide this contributor from bylines without deleting their record."
